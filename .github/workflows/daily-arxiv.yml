name: Daily arXiv Paper Selector

on:
  schedule:
    # 每天 UTC 01:00 執行 (台灣時間 09:00)
    - cron: '0 1 * * *'

  # 允許手動觸發
  workflow_dispatch:

jobs:
  select-papers:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 允許 commit 結果

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python and install dependencies
        run: |
          uv python install
          uv sync

      - name: Run arXiv selector
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OUTPUT_DIR: ./output
          TOP_N: 10
          LLM_MODEL: gemini-2.5-flash
          LLM_THINKING_BUDGET: 0
        run: |
          cd arxiv-selector
          uv run python src/main.py

      - name: Commit and push results
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 取得今天的日期
          DATE=$(date +%Y-%m-%d)

          # Add 生成的檔案
          git add arxiv-selector/output/*.md arxiv-selector/output/*.json 2>/dev/null || true

          # Commit (如果有變更)
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Daily arXiv papers - $DATE"
            git push
          fi

      - name: Upload artifacts (備用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-reports
          path: arxiv-selector/output/
          retention-days: 30